<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Model Viewer | OpenClaw</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0a0e17 0%, #1a2332 50%, #0d1520 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }
        
        header {
            text-align: center;
            padding: 1.5rem;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(100, 200, 255, 0.2);
        }
        
        h1 {
            font-size: 2rem;
            background: linear-gradient(90deg, #4fc3f7, #00bcd4, #4fc3f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .model-selector {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            padding: 1rem;
            flex-wrap: wrap;
        }
        
        .model-btn {
            padding: 0.6rem 1.2rem;
            background: rgba(79, 195, 247, 0.1);
            border: 1px solid rgba(79, 195, 247, 0.3);
            color: #4fc3f7;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }
        
        .model-btn:hover, .model-btn.active {
            background: rgba(79, 195, 247, 0.3);
            border-color: rgba(79, 195, 247, 0.6);
        }
        
        .model-btn .tag {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-left: 0.3rem;
        }
        
        #viewer-container {
            width: 90%;
            max-width: 1200px;
            aspect-ratio: 16/9;
            margin: 0 auto 1rem;
            background: radial-gradient(ellipse at center, #1a2332 0%, #0a0e17 100%);
            border-radius: 12px;
            border: 2px solid rgba(79, 195, 247, 0.3);
            box-shadow: 0 0 60px rgba(79, 195, 247, 0.1);
            position: relative;
            overflow: hidden;
        }
        
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #4fc3f7;
            font-size: 1.2rem;
            z-index: 100;
            text-align: center;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(79, 195, 247, 0.3);
            border-top-color: #4fc3f7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 0.5rem;
            z-index: 10;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .btn {
            padding: 0.6rem 1.2rem;
            background: rgba(79, 195, 247, 0.2);
            border: 1px solid rgba(79, 195, 247, 0.5);
            color: #4fc3f7;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        
        .btn:hover {
            background: rgba(79, 195, 247, 0.4);
        }
        
        .btn.active {
            background: rgba(79, 195, 247, 0.6);
            color: #fff;
        }
        
        .info-panel {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1rem;
        }
        
        .info-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(79, 195, 247, 0.2);
            border-radius: 12px;
            padding: 1.25rem;
        }
        
        .info-card h3 {
            color: #4fc3f7;
            margin-bottom: 0.75rem;
            font-size: 1rem;
        }
        
        .info-card p {
            color: #aabbc9;
            line-height: 1.6;
            font-size: 0.9rem;
        }
        
        .stats {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
        }
        
        .stat {
            background: rgba(0, 0, 0, 0.3);
            padding: 0.5rem 0.75rem;
            border-radius: 8px;
            border-left: 3px solid #4fc3f7;
            min-width: 80px;
        }
        
        .stat-label {
            font-size: 0.65rem;
            color: #8899a6;
            text-transform: uppercase;
        }
        
        .stat-value {
            font-size: 1.1rem;
            color: #fff;
            font-weight: bold;
        }
        
        footer {
            text-align: center;
            padding: 1.5rem;
            color: #667788;
            border-top: 1px solid rgba(79, 195, 247, 0.1);
            font-size: 0.9rem;
        }
        
        footer a {
            color: #4fc3f7;
            text-decoration: none;
        }
        
        .feature-list {
            list-style: none;
        }
        
        .feature-list li {
            padding: 0.3rem 0;
            color: #aabbc9;
            font-size: 0.85rem;
        }
        
        .feature-list li:before {
            content: "→";
            color: #4fc3f7;
            margin-right: 0.5rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>🚀 3D Model Viewer</h1>
    </header>
    
    <div class="model-selector" id="model-selector">
        <!-- Models will be populated by JS -->
    </div>
    
    <div id="viewer-container">
        <div id="loading" class="loading">
            <div class="spinner"></div>
            Loading 3D Model...
        </div>
        <canvas id="canvas"></canvas>
        <div class="controls">
            <button class="btn active" id="btn-rotate">⏵ Auto Rotate</button>
            <button class="btn" id="btn-wireframe">◈ Wireframe</button>
            <button class="btn" id="btn-bg">☀ Light BG</button>
            <button class="btn" id="btn-reset">⟲ Reset</button>
        </div>
    </div>
    
    <div class="info-panel" id="info-panel">
        <!-- Dynamic content -->
    </div>
    
    <footer>
        <p>Built with Blender + Three.js | 
        <a href="https://github.com/arrakistacos/voxel-star-fighter">GitHub Repo</a></p>
    </footer>
    
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // Model database - add your models here!
        const MODELS = {
            'anime-v6-voxel': {
                name: 'Anime Star Fighter V6',
                tag: 'Voxel - 40 Iterations',
                path: 'models/starfighter_v6_voxel.gltf',
                cameraPos: [13, -10, 7],
                stats: {
                    style: 'Anime / Mecha / Voxel',
                    iterations: '40 design → voxelize → refine',
                    focus: 'Design → Voxelize Components → Shape → Refine',
                    materials: 8
                },
                features: [
                    '40-iteration low-poly design base',
                    'Component-wise voxelization',
                    'Voxel fuselage with smooth edges',
                    'Voxel forward-swept wings',
                    'Voxel twin vertical stabilizers',
                    'V-fin headpiece',
                    'Voxel engine nacelles',
                    'Voxel intakes with dark material',
                    'Cockpit canopy',
                    'Thruster glow cubes',
                    'Voxel panel lines',
                    'Wing tip yellow voxel details',
                    'Beveled voxel edges',
                    'Smooth shading on voxel geometry',
                    'Hybrid low-poly + voxel aesthetic'
                ],
                bloom: { strength: 0.5, radius: 0.4, threshold: 0.75 }
            },
            'anime-v5': {
                name: 'Anime Star Fighter V5',
                tag: 'Complete - 75 Iterations',
                path: 'models/starfighter_anime_v5.gltf',
                cameraPos: [14, -11, 7],
                stats: {
                    style: 'Anime / Mecha',
                    iterations: '75 (5 phases)',
                    focus: 'Skeleton • Gap Fill • Shapes • Materials • Cohesion',
                    materials: 8
                },
                features: [
                    'Unified fuselage - no splits or gaps',
                    'Seamless nose-to-body transition',
                    'Complete wing surfaces with closed tips',
                    'Twin vertical stabilizers with tip lights',
                    'Engine housings with closed intake lips',
                    'V-fin headpiece with integrated base',
                    'Panel lines (indented, not raised)',
                    'Weapon pylons with solid caps',
                    'Surface fasteners and hardware',
                    'Navigation lights (red/green)',
                    'Formation markers',
                    'National insignia roundels',
                    'Belly stripes',
                    'Cockpit canopy with frame',
                    'Edge guards for surface continuity',
                    'Heat-resistant belly tiles',
                    'Pitot tube and static ports',
                    'Antenna',
                    'All gaps filled - complete model'
                ],
                bloom: { strength: 0.55, radius: 0.35, threshold: 0.7 }
            },
            'anime-v4': {
                name: 'Anime Star Fighter V4',
                tag: 'Clean - 90 Iterations',
                path: 'models/starfighter_anime_v4.gltf',
                cameraPos: [14, -11, 7],
                stats: {
                    style: 'Anime / Mecha',
                    iterations: '90 (4 phases)',
                    focus: 'Foundation • Shapes • Materials • Cohesiveness',
                    materials: 8
                },
                features: [
                    'Split fuselage with connecting spine',
                    'Forward-swept wing panels',
                    'Twin vertical stabilizers',
                    'Detailed V-fin headpiece',
                    'Engine nacelles with intake lips',
                    'Weapon hardpoints with rails',
                    'Panel lines and access hatches',
                    'Navigation lights (red/green)',
                    'Formation markers',
                    'National insignia roundels',
                    'Serial number stripes',
                    'Pitot tube and static ports',
                    'Antenna and surface details',
                    'Cockpit canopy with frame',
                    'Control surface hinges',
                    'Heat-resistant belly tiles'
                ],
                bloom: { strength: 0.55, radius: 0.35, threshold: 0.7 }
            },
            'anime-v3': {
                name: 'Anime Star Fighter V3',
                tag: 'Latest - 90 Iterations',
                path: 'models/starfighter_anime_v3.gltf',
                cameraPos: [14, -11, 7],
                stats: {
                    style: 'Anime / Mecha',
                    refinements: '90 total',
                    focus: 'Battle-tested • Detailed • Cohesive',
                    materials: 12
                },
                features: [
                    'Panel fasteners and access hatches',
                    'Maintenance labels and stencils',
                    'Fuel caps and service ports',
                    'Surface conduit and structural ribs',
                    'Hydraulic lines and actuators',
                    'Enhanced weapons with cooling fins',
                    'Targeting sensor and laser designator',
                    'Battle damage and scorch marks',
                    'Paint chips and repair patches',
                    'HUD projector and cockpit interior',
                    'Navigation lights and formation markers',
                    'Pitot tube and pitot-static ports',
                    'Roundels and serial numbers'
                ],
                bloom: { strength: 0.55, radius: 0.35, threshold: 0.7 }
            },
            'anime-v2': {
                name: 'Anime Star Fighter V2',
                tag: '40 Iterations',
                path: 'models/starfighter_anime_v2.gltf',
                cameraPos: [12, -9, 7],
                stats: {
                    style: 'Anime / Mecha',
                    refinements: '30+ (40 total)',
                    focus: 'Gaps • Shapes • Materials',
                    polys: '~2,400'
                },
                features: [
                    'Split fuselage with connecting spine',
                    'Reinforced nose with armor plating',
                    'Forward-swept wing extensions',
                    'Twin vertical stabilizers',
                    'Intake vents and air channels',
                    'Engine nacelles with glow effects',
                    'V-fin Gundam-style headpiece',
                    'Weapon hardpoints and pylons',
                    'Sensor domes and arrays',
                    'Navigation lights (red/green)',
                    'Panel lines and decals',
                    'Heat-resistant belly tiles'
                ],
                bloom: { strength: 0.5, radius: 0.35, threshold: 0.75 }
            },
            'anime': {
                name: 'Anime Star Fighter',
                tag: 'Low-Poly',
                path: 'models/starfighter_anime.gltf',
                cameraPos: [10, 7, 10],
                stats: {
                    style: 'Anime / Mecha',
                    refinements: 10,
                    polys: '~800',
                    materials: 7
                },
                features: [
                    'Streamlined fuselage with anime proportions',
                    'Pointed nose cone with V-fin detail',
                    'Bubble canopy cockpit',
                    'Angular swept wings',
                    'Dual thruster engines with glow',
                    'Wing-mounted cannons',
                    'Toon shader materials'
                ],
                bloom: { strength: 0.4, radius: 0.3, threshold: 0.8 }
            },
            'voxel': {
                name: 'Voxel Star Fighter',
                tag: 'Voxel',
                path: 'starfighter.gltf',
                cameraPos: [8, 6, 8],
                stats: {
                    style: 'Voxel Art',
                    refinements: 10,
                    voxels: 713,
                    materials: 7
                },
                features: [
                    'Cube-based voxel construction',
                    'Detailed panel lines',
                    'Extended wings with accents',
                    'Weapon barrels',
                    'Engine nacelles with emission',
                    'Surface details (vents, antenna)',
                    'PBR materials'
                ],
                bloom: { strength: 0.5, radius: 0.4, threshold: 0.85 }
            }
        };

        let currentModel = 'anime-v6-voxel';
        let viewer = null;

        // Initialize viewer
        function initViewer(modelKey) {
            const model = MODELS[modelKey];
            const container = document.getElementById('viewer-container');
            const canvas = document.getElementById('canvas');
            const loading = document.getElementById('loading');
            
            if (viewer) {
                // Cleanup previous viewer
                viewer.destroy?.();
            }
            
            // Scene
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x7a8490);
            scene.fog = new THREE.Fog(0x7a8490, 10, 50);

            // Camera
            const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(...model.cameraPos);

            // Renderer
            const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;

            // Post-processing
            const composer = new EffectComposer(renderer);
            const renderPass = new RenderPass(scene, camera);
            composer.addPass(renderPass);
            
            const bloomPass = new UnrealBloomPass(
                new THREE.Vector2(container.clientWidth, container.clientHeight),
                model.bloom.strength,
                model.bloom.radius,
                model.bloom.threshold
            );
            composer.addPass(bloomPass);

            // Controls
            const controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 2;
            controls.minDistance = 3;
            controls.maxDistance = 25;
            controls.target.set(0, 0, 0);

            // Lighting
            const ambient = new THREE.AmbientLight(0x404040, 0.5);
            scene.add(ambient);

            const keyLight = new THREE.DirectionalLight(0xffffff, 1.5);
            keyLight.position.set(5, -5, 5);
            keyLight.castShadow = true;
            scene.add(keyLight);

            const fillLight = new THREE.DirectionalLight(0x88ccff, 0.8);
            fillLight.position.set(-5, 3, 2);
            scene.add(fillLight);

            const rimLight = new THREE.DirectionalLight(0xffaa77, 0.8);
            rimLight.position.set(0, 5, -3);
            scene.add(rimLight);

            // Grid
            const grid = new THREE.GridHelper(20, 20, 0x1a3a5c, 0x0d1f2d);
            grid.position.y = -3;
            scene.add(grid);

            // Load model
            let loadedModel = null;
            let wireframeMode = false;

            loading.style.display = 'block';
            
            const loader = new GLTFLoader();
            loader.load(model.path,
                (gltf) => {
                    loadedModel = gltf.scene;
                    
                    const box = new THREE.Box3().setFromObject(loadedModel);
                    const center = box.getCenter(new THREE.Vector3());
                    const size = box.getSize(new THREE.Vector3());
                    const maxDim = Math.max(size.x, size.y, size.z);
                    const scale = 3 / maxDim;
                    
                    loadedModel.scale.setScalar(scale);
                    loadedModel.position.sub(center.multiplyScalar(scale));
                    
                    loadedModel.traverse((child) => {
                        if (child.isMesh) {
                            child.castShadow = true;
                            child.receiveShadow = true;
                            child.userData.originalMaterial = child.material?.clone();
                        }
                    });
                    
                    scene.add(loadedModel);
                    loading.style.display = 'none';
                },
                (xhr) => {
                    const pct = Math.round(xhr.loaded / xhr.total * 100);
                    loading.innerHTML = `<div class="spinner"></div>Loading... ${pct}%`;
                },
                (err) => {
                    console.error(err);
                    loading.innerHTML = '<p style="color: #ff6666;">Failed to load</p>';
                }
            );

            // Animation loop
            let animId;
            function animate() {
                animId = requestAnimationFrame(animate);
                controls.update();
                composer.render();
            }
            animate();

            // Resize handler
            const onResize = () => {
                camera.aspect = container.clientWidth / container.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(container.clientWidth, container.clientHeight);
                composer.setSize(container.clientWidth, container.clientHeight);
            };
            window.addEventListener('resize', onResize);

            // Store viewer methods
            viewer = {
                toggleRotate: () => {
                    controls.autoRotate = !controls.autoRotate;
                    return controls.autoRotate;
                },
                toggleWireframe: () => {
                    wireframeMode = !wireframeMode;
                    if (loadedModel) {
                        loadedModel.traverse((child) => {
                            if (child.isMesh) {
                                child.material = wireframeMode 
                                    ? new THREE.MeshBasicMaterial({ color: darkBg ? 0x4fc3f7 : 0x0066cc, wireframe: true })
                                    : child.userData.originalMaterial;
                            }
                        });
                    }
                    return wireframeMode;
                },
                setBackground: (bgColor, fogColor, gridColor1, gridColor2) => {
                    scene.background = new THREE.Color(bgColor);
                    scene.fog = new THREE.Fog(fogColor, 10, 50);
                    // Remove old grid
                    scene.children = scene.children.filter(child => !(child instanceof THREE.GridHelper));
                    // Add new grid
                    const newGrid = new THREE.GridHelper(20, 20, gridColor1, gridColor2);
                    newGrid.position.y = -3;
                    scene.add(newGrid);
                },
                reset: () => {
                    camera.position.set(...model.cameraPos);
                    controls.target.set(0, 0, 0);
                    controls.update();
                },
                destroy: () => {
                    cancelAnimationFrame(animId);
                    window.removeEventListener('resize', onResize);
                }
            };

            return viewer;
        }

        // Update info panel
        function updateInfo(modelKey) {
            const model = MODELS[modelKey];
            const panel = document.getElementById('info-panel');
            
            panel.innerHTML = `
                <div class="info-card">
                    <h3>📊 Model Stats</h3>
                    <div class="stats">
                        ${Object.entries(model.stats).map(([k, v]) => `
                            <div class="stat">
                                <div class="stat-label">${k}</div>
                                <div class="stat-value">${v}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                <div class="info-card">
                    <h3>🎨 Design Features</h3>
                    <ul class="feature-list">
                        ${model.features.map(f => `<li>${f}</li>`).join('')}
                    </ul>
                </div>
                <div class="info-card">
                    <h3>🛠️ Controls</h3>
                    <p>
                        <strong>Left Click + Drag:</strong> Rotate<br>
                        <strong>Right Click + Drag:</strong> Pan<br>
                        <strong>Scroll:</strong> Zoom<br>
                        <strong>Auto Rotate:</strong> Toggle smooth rotation<br>
                        <strong>Wireframe:</strong> See mesh structure
                    </p>
                </div>
            `;
        }

        // Build model selector
        function buildSelector() {
            const selector = document.getElementById('model-selector');
            selector.innerHTML = Object.entries(MODELS).map(([key, model]) => `
                <button class="model-btn ${key === currentModel ? 'active' : ''}" data-model="${key}">
                    ${model.name}
                    <span class="tag">${model.tag}</span>
                </button>
            `).join('');
            
            selector.querySelectorAll('.model-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    currentModel = btn.dataset.model;
                    selector.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    initViewer(currentModel);
                    updateInfo(currentModel);
                });
            });
        }

        // Control buttons
        let darkBg = true;
        
        document.getElementById('btn-rotate').addEventListener('click', function() {
            const active = viewer?.toggleRotate();
            this.classList.toggle('active', active);
            this.innerHTML = active ? '⏵ Auto Rotate' : '⏸ Auto Rotate';
        });

        document.getElementById('btn-wireframe').addEventListener('click', function() {
            const active = viewer?.toggleWireframe();
            this.classList.toggle('active', active);
        });

        document.getElementById('btn-bg').addEventListener('click', function() {
            darkBg = !darkBg;
            const bgColor = darkBg ? 0x0a0e17 : 0x8a94a0;
            const fogColor = darkBg ? 0x0a0e17 : 0x8a94a0;
            const gridColor1 = darkBg ? 0x1a3a5c : 0x556677;
            const gridColor2 = darkBg ? 0x0d1f2d : 0x334455;
            
            // Update viewer background if initialized
            if (viewer && viewer.setBackground) {
                viewer.setBackground(bgColor, fogColor, gridColor1, gridColor2);
            }
            
            // Update body background - muted gray instead of bright white
            document.body.style.background = darkBg 
                ? 'linear-gradient(135deg, #0a0e17 0%, #1a2332 50%, #0d1520 100%)'
                : 'linear-gradient(135deg, #7a8490 0%, #8a94a0 50%, #9aa4b0 100%)';
            
            // Update text colors
            document.body.style.color = darkBg ? '#fff' : '#1a2332';
            
            this.innerHTML = darkBg ? '☀ Light BG' : '🌙 Dark BG';
            this.classList.toggle('active', !darkBg);
        });

        document.getElementById('btn-reset').addEventListener('click', () => {
            viewer?.reset();
        });

        // Initialize
        buildSelector();
        initViewer(currentModel);
        updateInfo(currentModel);
    </script>
</body>
</html>
